spring:
  datasource:
    url: jdbc:h2:file:./.runtime/demo-db/material_points;MODE=MySQL;AUTO_SERVER=TRUE;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create
  flyway:
    enabled: false
  sql:
    init:
      mode: always
      data-locations: classpath:db/demo-data.sql

logging:
  level:
    root: info
    com.gongdi.materialpoints: info
